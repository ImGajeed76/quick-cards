name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Patch manifest.json version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Chrome manifest version must be dot-separated digits only (no pre-release suffix)
          MANIFEST_VERSION=$(echo "$VERSION" | sed 's/-.*//')
          bun -e "
            const manifest = await Bun.file('public/manifest.json').json();
            manifest.version = '$MANIFEST_VERSION';
            await Bun.write('public/manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "
          echo "Patched manifest.json version to $MANIFEST_VERSION"

      - name: Build
        run: bun run build

      - name: Create zip
        run: |
          cd dist
          zip -r "../quick-cards-${GITHUB_REF_NAME}.zip" .

      - name: Detect pre-release
        id: prerelease
        run: |
          if echo "$GITHUB_REF_NAME" | grep -qE -- '-(alpha|beta|rc|dev|canary)'; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "quick-cards-${GITHUB_REF_NAME}.zip" \
            --title "QuickCards $GITHUB_REF_NAME" \
            --generate-notes \
            ${{ steps.prerelease.outputs.flag }}
