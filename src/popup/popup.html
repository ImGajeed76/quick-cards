<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickCards</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { width: 340px; min-height: 100px; }
  </style>
</head>
<body class="bg-card text-card-foreground" x-data="popup">

  <!-- Loading State -->
  <div x-show="screen === 'loading'" class="p-4">
    <div class="flex items-center justify-center py-8 gap-2">
      <svg class="h-4 w-4 animate-spin text-primary" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      <span class="text-sm text-muted-foreground">Scanning cards...</span>
    </div>
  </div>

  <!-- Error State -->
  <div x-show="screen === 'error'" x-cloak class="p-4">
    <div class="flex flex-col items-center py-8 gap-3">
      <svg class="w-6 h-6 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p class="text-sm text-muted-foreground">Open a Quizlet set to get started</p>
    </div>
  </div>

  <!-- Main Screen -->
  <div x-show="screen === 'main'" x-cloak class="p-4 space-y-3">

    <!-- Header: count + copy -->
    <div class="flex items-center justify-between">
      <span class="text-sm text-muted-foreground"><strong class="text-foreground font-semibold text-base tabular-nums" x-text="cardCount"></strong> cards</span>
      <button
        x-on:click="copy"
        class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 h-9 w-20"
        x-bind:class="copied ? 'bg-primary/20 text-primary' : 'bg-primary text-primary-foreground hover:bg-primary/90'"
        x-bind:disabled="copied"
        x-text="copied ? 'Copied' : 'Copy'"
      ></button>
    </div>

    <!-- Preview (collapsible) -->
    <div>
      <button
        x-on:click="preview = !preview"
        class="flex items-center gap-1.5 text-sm text-muted-foreground hover:text-foreground select-none transition-colors duration-150 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 rounded-sm"
      >
        <span class="inline-flex transition-transform duration-200" x-bind:style="preview ? 'transform: rotate(90deg)' : ''">
          <svg class="w-3.5 h-3.5 opacity-60" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </span>
        Preview
      </button>
      <div x-show="preview" x-collapse x-cloak class="mt-2 max-h-36 overflow-y-auto rounded-md border border-border custom-scrollbar">
        <table class="w-full text-xs">
          <tbody x-ref="previewTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Export options button -->
    <button
      x-on:click="screen = 'export'"
      class="inline-flex w-full items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors duration-150 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9"
    >
      <svg class="w-4 h-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export options
    </button>
  </div>

  <!-- Export Screen -->
  <div x-show="screen === 'export'" x-cloak class="p-4 space-y-4">

    <!-- Back -->
    <button
      x-on:click="screen = 'main'"
      class="inline-flex items-center gap-1.5 text-sm text-muted-foreground hover:text-foreground transition-colors duration-150 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 rounded-sm -ml-1"
    >
      <svg class="w-4 h-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      Back
    </button>

    <!-- Separators -->
    <div>
      <div class="flex gap-2">
        <!-- Term-Def combobox -->
        <div class="flex-1 space-y-1" x-data="combobox" x-init="initTermSep">
          <label class="text-xs text-muted-foreground">Term-Def separator</label>
          <div class="relative">
            <div class="flex h-9 w-full items-center rounded-md border border-input bg-background text-sm ring-offset-background" x-bind:class="open ? 'ring-2 ring-ring ring-offset-2' : ''">
              <input
                type="text"
                x-model="value"
                x-on:focus="open = true"
                x-on:keydown.escape="open = false"
                x-on:input="saveSettings"
                class="h-full w-full bg-transparent px-3 py-2 text-sm outline-none placeholder:text-muted-foreground"
                placeholder="e.g. |"
              />
              <button
                type="button"
                x-on:click="open = !open"
                class="flex h-full items-center px-2 text-muted-foreground hover:text-foreground transition-colors duration-150"
                aria-label="Show presets"
              >
                <span class="inline-flex transition-transform duration-200" x-bind:style="open ? 'transform: rotate(180deg)' : ''">
                  <svg class="w-4 h-4 opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </span>
              </button>
            </div>
            <div
              x-show="open"
              x-cloak
              x-on:click.outside="open = false"
              x-transition:enter="transition ease-out duration-100"
              x-transition:enter-start="opacity-0 scale-95"
              x-transition:enter-end="opacity-100 scale-100"
              x-transition:leave="transition ease-in duration-75"
              x-transition:leave-start="opacity-100 scale-100"
              x-transition:leave-end="opacity-0 scale-95"
              class="absolute z-50 mt-1 w-full rounded-md bg-popover text-popover-foreground shadow-md ring-1 ring-foreground/10 p-1"
            >
              <template x-for="preset in presets">
                <button
                  type="button"
                  x-on:click="pick(preset)"
                  class="flex w-full items-center justify-between rounded-sm py-1.5 pl-2 pr-2 text-sm outline-none transition-colors duration-150 hover:bg-accent hover:text-accent-foreground"
                >
                  <span x-text="preset"></span>
                  <svg x-show="value === preset" class="w-4 h-4 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                </button>
              </template>
            </div>
          </div>
        </div>

        <!-- Cards combobox -->
        <div class="flex-1 space-y-1" x-data="combobox" x-init="initCardSep">
          <label class="text-xs text-muted-foreground">Card separator</label>
          <div class="relative">
            <div class="flex h-9 w-full items-center rounded-md border border-input bg-background text-sm ring-offset-background" x-bind:class="open ? 'ring-2 ring-ring ring-offset-2' : ''">
              <input
                type="text"
                x-model="value"
                x-on:focus="open = true"
                x-on:keydown.escape="open = false"
                x-on:input="saveSettings"
                class="h-full w-full bg-transparent px-3 py-2 text-sm outline-none placeholder:text-muted-foreground"
                placeholder="e.g. --"
              />
              <button
                type="button"
                x-on:click="open = !open"
                class="flex h-full items-center px-2 text-muted-foreground hover:text-foreground transition-colors duration-150"
                aria-label="Show presets"
              >
                <span class="inline-flex transition-transform duration-200" x-bind:style="open ? 'transform: rotate(180deg)' : ''">
                  <svg class="w-4 h-4 opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </span>
              </button>
            </div>
            <div
              x-show="open"
              x-cloak
              x-on:click.outside="open = false"
              x-transition:enter="transition ease-out duration-100"
              x-transition:enter-start="opacity-0 scale-95"
              x-transition:enter-end="opacity-100 scale-100"
              x-transition:leave="transition ease-in duration-75"
              x-transition:leave-start="opacity-100 scale-100"
              x-transition:leave-end="opacity-0 scale-95"
              class="absolute z-50 mt-1 w-full rounded-md bg-popover text-popover-foreground shadow-md ring-1 ring-foreground/10 p-1"
            >
              <template x-for="preset in presets">
                <button
                  type="button"
                  x-on:click="pick(preset)"
                  class="flex w-full items-center justify-between rounded-sm py-1.5 pl-2 pr-2 text-sm outline-none transition-colors duration-150 hover:bg-accent hover:text-accent-foreground"
                >
                  <span x-text="preset"></span>
                  <svg x-show="value === preset" class="w-4 h-4 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                </button>
              </template>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Export actions -->
    <div class="space-y-2">
      <button
        x-on:click="copyFromExport"
        class="inline-flex w-full items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 h-9"
        x-bind:class="exportCopied ? 'bg-primary/20 text-primary' : 'bg-primary text-primary-foreground hover:bg-primary/90'"
        x-bind:disabled="exportCopied"
        x-text="exportCopied ? 'Copied' : 'Copy to clipboard'"
      ></button>

      <div class="flex items-center gap-3 py-1">
        <div class="h-px flex-1 bg-border"></div>
        <span class="text-xs text-muted-foreground">Download as file</span>
        <div class="h-px flex-1 bg-border"></div>
      </div>

      <button x-on:click="exportTXT" class="inline-flex w-full items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors duration-150 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9">
        TXT
      </button>
      <button x-on:click="exportCSV" class="inline-flex w-full items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors duration-150 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9">
        CSV
      </button>
      <button x-on:click="exportJSON" class="inline-flex w-full items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors duration-150 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9">
        JSON
      </button>
      <button x-on:click="exportPDFList" class="inline-flex w-full items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors duration-150 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9">
        PDF &mdash; Vocab list
      </button>
      <button x-on:click="exportPDFCards" class="inline-flex w-full items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors duration-150 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9">
        PDF &mdash; Flashcards
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
